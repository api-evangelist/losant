      - Custom Nodes
      - Sandboxes
      - Notification Rules
    humanURL: https://docs.losant.com/rest-api/instance/
    baseURL: https://api.losant.com
    description: |
      Administer dedicated or self-hosted Losant Enterprise Instances: instance members, organizations within
