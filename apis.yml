      - Visual Workflow Engine
      - Automation
      - Orchestration
      - Versioning
    humanURL: https://docs.losant.com/rest-api/flow/
    baseURL: https://api.losant.com
    description: |
      Create, version, deploy, debug, and execute flows in the Losant Visual Workflow Engine. Supports
