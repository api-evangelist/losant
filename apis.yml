      - EEA
      - Deployments
      - Gateways
      - Microcontrollers
    humanURL: https://docs.losant.com/rest-api/edge-deployment/
    baseURL: https://api.losant.com
    description: |
      Manage Losant Edge Compute deployments to Linux gateways (Gateway Edge Agent) and Embedded Edge Agent
