name: Manage Experience Users
description: Create, authenticate, and manage end-user accounts inside white-labeled
  Losant Experiences.
provider: losant
api: experience
operations:
- path: /applications/{applicationId}/experience/users
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
- path: /applications/{applicationId}/experience/users/{experienceUserId}
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
auth: BearerAuth (Losant JWT)
inputs:
- applicationId
- deviceId or flowId where applicable
outputs:
- Losant resource JSON per OpenAPI schemas
