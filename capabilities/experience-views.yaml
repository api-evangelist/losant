name: Manage Experience Views
description: Author and publish Handlebars-templated server-rendered Experience views.
provider: losant
api: experience
operations:
- path: /applications/{applicationId}/experience/views
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
auth: BearerAuth (Losant JWT)
inputs:
- applicationId
- deviceId or flowId where applicable
outputs:
- Losant resource JSON per OpenAPI schemas
