name: Manage Workflows
description: Create, update, archive, and search workflows in the Visual Workflow
  Engine across cloud, edge, embedded, experience, and custom-node classes.
provider: losant
api: workflow
operations:
- path: /applications/{applicationId}/flows
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
- path: /applications/{applicationId}/flows/{flowId}
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
auth: BearerAuth (Losant JWT)
inputs:
- applicationId
- deviceId or flowId where applicable
outputs:
- Losant resource JSON per OpenAPI schemas
