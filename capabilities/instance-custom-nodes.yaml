name: Manage Enterprise Instance Custom Nodes
description: Publish and manage instance-wide custom workflow nodes available to all
  organizations on the instance.
provider: losant
api: instance
operations:
- path: /instances/{instanceId}/custom-nodes
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
auth: BearerAuth (Losant JWT)
inputs:
- applicationId
- deviceId or flowId where applicable
outputs:
- Losant resource JSON per OpenAPI schemas
