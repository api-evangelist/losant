name: Manage IoT Devices
description: Provision, search, tag, update, archive, and decommission IoT devices
  and device recipes.
provider: losant
api: device
operations:
- path: /applications/{applicationId}/devices
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
- path: /applications/{applicationId}/devices/{deviceId}
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
auth: BearerAuth (Losant JWT)
inputs:
- applicationId
- deviceId or flowId where applicable
outputs:
- Losant resource JSON per OpenAPI schemas
