name: Manage Application Integrations
description: Configure outbound integrations to MQTT brokers, AWS, Azure, GCP, and
  other systems used by workflows.
provider: losant
api: application
operations:
- path: /applications/{applicationId}/integrations
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
- path: /applications/{applicationId}/integrations/{integrationId}
  methods:
  - GET
  - POST
  - PATCH
  - DELETE
auth: BearerAuth (Losant JWT)
inputs:
- applicationId
- deviceId or flowId where applicable
outputs:
- Losant resource JSON per OpenAPI schemas
