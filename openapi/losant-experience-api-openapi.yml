        route:
          $ref: '#/components/schemas/common/reqMedStr'
        enabled:
          type: boolean
        method:
          $ref: '#/components/schemas/experienceEndpoint/properties/method'
        access:
          $ref: '#/components/schemas/experienceEndpoint/properties/access'
        deviceIdTemplate:
          $ref: '#/components/schemas/experienceEndpoint/properties/deviceIdTemplate'
        endpointTags:
          $ref: '#/components/schemas/experienceEndpoint/properties/endpointTags'
        experienceGroupIds:
          $ref: '#/components/schemas/common/objectIds'
        staticReply:
          $ref: '#/components/schemas/common/staticReply'
        unauthorizedReply:
