      - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Losant uses JSON Web Tokens (JWTs) for authentication. Obtain a token via POST /auth/user, POST /auth/device,
        POST /applications/{applicationId}/tokens, or POST /me/tokens and pass it in the Authorization header as `Bearer <token>`.
  schemas:
    error:
      title: Error
      description: Schema for errors returned by the API
      type: object
      properties:
        type:
          type: string
        message:
          type: string
    experienceBootstrapOptions:
      title: Experience Bootstrap Options
      description: The body of an experience bootstrap request
      type: object
      properties:
        replaceExisting:
          type: boolean
          default: false
        createUsers:
          type: boolean
          default: true
        createGroups:
          type: boolean
          default: true
        slug:
          $ref: '#/components/schemas/common/slug'
      additionalProperties: false
    experienceBootstrapResult:
      title: Experience Bootstrap Result
      description: The result of an experience bootstrap request
      type: object
      properties:
        resourceSuffix:
          type: string
        password:
          type: string
        email:
          type: string
      additionalProperties: false
    experienceDomain:
      title: Experience Domain
      description: Schema for a single Experience Domain
      type: object
      properties:
        id:
          $ref: '#/components/schemas/common/objectId'
        experienceDomainId:
          $ref: '#/components/schemas/common/objectId'
        applicationId:
          $ref: '#/components/schemas/common/objectId'
        creationDate:
          $ref: '#/components/schemas/common/date'
        lastUpdated:
          $ref: '#/components/schemas/common/date'
        sslCert:
          $ref: '#/components/schemas/common/certificateString'
        sslBundle:
          $ref: '#/components/schemas/common/certificateString'
        domainName:
          $ref: '#/components/schemas/common/domainName'
        version:
          $ref: '#/components/schemas/common/name'
    experienceDomainPatch:
      title: Experience Domain Patch
      description: Schema for the body of an Experience Domain modification request
      type: object
      properties:
        sslKey:
          oneOf:
          - $ref: '#/components/schemas/experienceDomainPost/properties/sslKey'
          - type: 'null'
        sslCert:
          oneOf:
          - $ref: '#/components/schemas/experienceDomain/properties/sslCert'
          - type: 'null'
        sslBundle:
          oneOf:
          - $ref: '#/components/schemas/experienceDomain/properties/sslBundle'
          - type: 'null'
        version:
          oneOf:
          - $ref: '#/components/schemas/common/name'
          - type: 'null'
        domainName:
          $ref: '#/components/schemas/experienceDomain/properties/domainName'
      additionalProperties: false
    experienceDomainPost:
      title: Experience Domain Post
      description: Schema for the body of an Experience Domain creation request
      type: object
      properties:
        sslKey:
          type: string
          maxLength: 32767
          minLength: 50
        sslCert:
          $ref: '#/components/schemas/experienceDomain/properties/sslCert'
        sslBundle:
          $ref: '#/components/schemas/experienceDomain/properties/sslBundle'
        domainName:
          $ref: '#/components/schemas/experienceDomain/properties/domainName'
        version:
          oneOf:
          - $ref: '#/components/schemas/common/name'
          - type: 'null'
      additionalProperties: false
      required:
      - domainName
    experienceDomains:
      title: Experience Domains
      description: Schema for a collection of Experience Domains
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/experienceDomain'
        count:
