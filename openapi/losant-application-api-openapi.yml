            username:
              $ref: '#/components/schemas/common/reqMedStr'
            password:
              $ref: '#/components/schemas/common/reqMedStr'
            privateKey:
              $ref: '#/components/schemas/common/certificate'
            certificate:
              $ref: '#/components/schemas/common/certificate'
            caCertificate:
              $ref: '#/components/schemas/common/certificate'
            headers:
              type: array
              maxItems: 50
              items:
                type: object
                properties:
                  headerKey:
                    $ref: '#/components/schemas/common/reqMedStr'
                  headerValue:
                    $ref: '#/components/schemas/common/reqMedStr'
                additionalProperties: false
                required:
                - headerKey
                - headerValue
          additionalProperties: false
          required:
          - url
        status:
          lastKeepAlive:
            type:
            - number
          nextAttempt:
            type:
            - number
          connectInfo:
            type: object
            properties:
              ts:
                type:
                - number
                - 'null'
