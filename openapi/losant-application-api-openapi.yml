components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Losant uses JSON Web Tokens (JWTs) for authentication. Obtain a token via POST /auth/user, POST /auth/device,
        POST /applications/{applicationId}/tokens, or POST /me/tokens and pass it in the Authorization header as `Bearer <token>`.
  schemas:
    advancedEventQuery:
      title: Advanced Event Query
      description: Schema for advanced event queries
      type: object
      properties:
        $and:
          type: array
          items:
            $ref: '#/components/schemas/advancedEventQuery'
          maxItems: 100
        $or:
          type: array
          items:
            $ref: '#/components/schemas/advancedEventQuery'
          maxItems: 100
        $nor:
          type: array
          items:
            $ref: '#/components/schemas/advancedEventQuery'
          maxItems: 100
        id:
          $ref: '#/components/schemas/common/advancedValueQuery'
        creationDate:
          $ref: '#/components/schemas/common/advancedValueQuery'
        lastUpdated:
          $ref: '#/components/schemas/common/advancedValueQuery'
        sourceId:
          $ref: '#/components/schemas/common/advancedValueQuery'
        sourceType:
          $ref: '#/components/schemas/common/advancedValueQuery'
        level:
          $ref: '#/components/schemas/common/advancedValueQuery'
        state:
          $ref: '#/components/schemas/common/advancedValueQuery'
        subject:
          $ref: '#/components/schemas/common/advancedValueQuery'
        deviceId:
          $ref: '#/components/schemas/common/advancedValueQuery'
        experienceUserId:
          $ref: '#/components/schemas/common/advancedIdQuery'
        experienceGroupId:
          $ref: '#/components/schemas/common/advancedIdQuery'
        eventTags:
          $ref: '#/components/schemas/common/advancedTagQueryWithOps'
      additionalProperties: false
    apiToken:
      title: API Token
      description: Schema for a single API Token
      type: object
      properties:
        id:
          $ref: '#/components/schemas/common/objectId'
        apiTokenId:
          $ref: '#/components/schemas/common/objectId'
        ownerId:
          $ref: '#/components/schemas/common/objectId'
        ownerType:
          type: string
          enum:
          - application
          - user
        creatorId:
          $ref: '#/components/schemas/common/objectId'
        creatorType:
          type: string
          enum:
          - apiToken
          - user
          - flow
        creatorName:
          $ref: '#/components/schemas/common/optMedStr'
        name:
          $ref: '#/components/schemas/common/name'
