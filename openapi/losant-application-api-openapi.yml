          type: object
          properties:
            accessKeyId:
              type: string
              min: 4
              max: 128
            secretAccessKey:
              type: string
              min: 4
              max: 128
            region:
              type: string
              min: 4
              max: 128
            queueUrl:
              type: string
              min: 1
              max: 256
          additionalProperties: false
          required:
          - queueUrl
        websocketConfig:
